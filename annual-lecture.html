<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Annual Memorial Lecture – Scottish Norwegian Society</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #ffffff;
        }

        /* --- SMALL LOGO HEADER --- */
        .header-container {
            display: flex;
            align-items: center;
            padding: 10px 20px;
            background: #ffffff; /* no blue banner */
            border-bottom: 4px solid #00264d; /* subtle Norwegian blue accent */
        }

        .logo-small {
            width: 50px;
            height: 50px;
            object-fit: cover;
            margin-right: 15px;
        }

        .header-text h1 {
            margin: 0;
            font-size: 22px;
            color: #00264d;
        }

        .header-text p {
            margin: 0;
            font-size: 16px;
            color: #ba0c2f;
        }

        /* --- NAVIGATION BAR --- */
        nav {
            background: #ba0c2f;
            padding: 10px 0;
            border-bottom: 4px solid #00264d;
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        nav li {
            display: inline-block;
            margin: 0 12px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
        }

        nav a:hover {
            text-decoration: underline;
        }

        /* --- MAIN CONTENT --- */
        main {
            max-width: 900px;
            margin: auto;
            padding: 30px;
            background: #ffffff;
        }

        h2 {
            color: #00264d;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #00264d;
            color: white;
            border-top: 4px solid #ba0c2f;
            margin-top: 40px;
        }

        /* --- MOBILE LAYOUT IMPROVEMENTS --- */
        @media (max-width: 600px) {

            .header-container {
                flex-direction: column;
                text-align: center;
            }

            .logo-small {
                margin-right: 0;
                margin-bottom: 10px;
            }

            nav ul {
                display: block;
                text-align: left;
                padding-left: 20px;
            }

            nav li {
                display: block;
                margin: 8px 0;
            }

            nav a {
                font-size: 18px;
            }

            main {
                padding: 20px;
            }

            h1 {
                font-size: 20px;
            }

            h2 {
                font-size: 20px;
            }
        }
    </style>
</head>
