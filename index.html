<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scottish Norwegian Society (Glasgow)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #00205B; /* Blue background */
        }

        /* --- CENTERED BANNER MATCHING MAIN WIDTH --- */
        .banner-wrapper {
            text-align: center;
            padding: 20px 0;
            background: #00205B;
            position: relative;
        }

        .banner-image {
            width: 100%;
            max-width: 900px;   /* SAME WIDTH AS MAIN CONTENT */
            border: 6px solid #ffffff;      /* Outer white border */
            box-shadow: 0 0 0 3px #EF2B2D;  /* Inner thin Norwegian-red border */
            border-radius: 6px;
        }

        /* --- FLAG RIBBON --- */
        .flag-ribbon {
            position: absolute;
            top: 25px;
            right: calc(50% - 450px); /* aligns with banner edge */
            width: 60px;
            height: 40px;
            background: url('SNS-Logo_Wood.jpg') no-repeat center center;
            background-size: cover;
            border: 3px solid #ffffff;
            border-radius: 6px;
        }

        /* --- SMALL LOGO HEADER --- */
        .header-container {
            display: flex;
            align-items: center;
            padding: 10px 20px;
            background: #ffffff;
            border-bottom: 4px solid #EF2B2D;
        }

        .logo-small {
            width: 50px;
            height: 50px;
            object-fit: cover;
            margin-right: 15px;
        }

        .header-text h1 {
            margin: 0;
            font-size: 22px;
            color: #00205B;
        }

        .header-text p {
            margin: 0;
            font-size: 16px;
            color: #EF2B2D;
        }

        /* --- DROPDOWN MENU WITH ROUNDED CORNERS --- */
        nav {
            background: #EF2B2D;
            border-bottom: 4px solid #00205B;
        }

        nav ul.menu {
            list-style: none;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        nav ul.menu > li {
            display: inline-block;
            position: relative;
            margin: 0 12px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            padding: 10px;
            display: inline-block;
        }

        nav a:hover {
            text-decoration: underline;
        }

        /* --- SUBMENU --- */
        nav ul.submenu {
            display: none;
            position: absolute;
            background: #00205B;
            padding: 10px 0;
            list-style: none;
            margin: 0;
            border: 3px solid #EF2B2D;
            border-radius: 10px; /* Rounded corners */
            min-width: 180px;
            z-index: 1000;
        }

        nav ul.submenu li {
            display: block;
            margin: 0;
        }

        nav ul.submenu a {
            display: block;
            padding: 8px 12px;
            color: white;
            font-size: 15px;
        }

        nav ul.submenu a:hover {
            background: #EF2B2D;
            border-radius: 6px;
        }

        /* --- SHOW SUBMENU ON HOVER --- */
        nav li.dropdown:hover .submenu {
            display: block;
        }

        /* --- MAIN CONTENT --- */
        main {
            max-width: 900px;
            margin: auto;
            padding: 30px;
            background: #ffffff;
            margin-top: 20px;
            border-radius: 6px;
        }

        h2 {
            color: #00205B;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #00205B;
            color: white;
            border-top: 4px solid #EF2B2D;
            margin-top: 40px;
        }
